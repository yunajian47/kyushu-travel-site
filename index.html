<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全日本旅行資料庫</title>
  <meta name="description" content="全日本大型旅行資料庫，含互動地圖、Google Maps 連結、評分、評論數、座標清理、分類、花費與基本資訊。">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQj5yL0KDrjAeGqQH7fC6Ky9J+2x4kA=" crossorigin="">
  <link rel="stylesheet" href="assets/styles.css?v=all-japan-15000-20260710">
</head>
<body>
  <header class="hero">
    <section class="hero-inner">
      <h1>全日本旅行資料庫</h1>
    </section>
  </header>

  <main>
    <section id="places" class="panel">
      <div class="toolbar">
        <label class="search">
          <span>搜尋</span>
          <input id="searchInput" type="search" placeholder="輸入地名、餐廳、海鮮、市場、溫泉、岬、展望台...">
        </label>
        <label><span>地區</span><select id="regionFilter"><option value="">全部地區</option></select></label>
        <label><span>類型</span><select id="kindFilter"><option value="">全部類型</option></select></label>
        <label><span>最低評分</span><select id="ratingFilter"><option value="">不限評分</option></select></label>
        <label><span>最低評論</span><select id="reviewFilter"><option value="">不限評論數</option></select></label>
        <label>
          <span>排序</span>
          <select id="sortSelect">
            <option value="score">推薦優先</option>
            <option value="reviews">評論數高到低</option>
            <option value="rating">評分高到低</option>
            <option value="region">地區排序</option>
          </select>
        </label>
      </div>

      <section id="mapSection" class="map-panel" aria-label="地點地圖">
        <div class="map-header">
          <div>
            <h2>地圖位置</h2>
            <p><strong id="mapCount">0</strong> 個目前篩選結果會顯示在地圖上。</p>
          </div>
          <button id="fitMap" type="button">顯示全部標記</button>
        </div>
        <div id="map" class="map"></div>
      </section>

      <div class="result-line"><strong id="resultCount">0</strong> 個符合條件</div>
      <div id="cardGrid" class="grid"></div>
      <button id="loadMore" class="load-more" type="button">載入更多</button>
    </section>
  </main>

  <div id="previewModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-preview></div>
    <article class="preview-dialog" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
      <button class="modal-close" type="button" data-close-preview aria-label="關閉預覽">×</button>
      <img id="previewPhoto" alt="" class="preview-photo">
      <div class="preview-body">
        <div id="previewBadges" class="preview-badges"></div>
        <h2 id="previewTitle"></h2>
        <dl class="preview-facts">
          <div><dt>評分</dt><dd id="previewRating"></dd></div>
          <div><dt>評論</dt><dd id="previewReviews"></dd></div>
          <div><dt>花費</dt><dd id="previewCost"></dd></div>
          <div><dt>座標</dt><dd id="previewCoords"></dd></div>
        </dl>
        <div class="actions preview-actions">
          <a id="previewMaps" href="#" target="_blank" rel="noopener">Google Maps</a>
          <button id="previewFocusMap" type="button" class="secondary-button">在地圖查看</button>
        </div>
      </div>
    </article>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="assets/app.js?v=all-japan-15000-20260710"></script>
</body>
</html>
